<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROC Monitor — Panel de Control</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ── TOPBAR ─────────────────────────────────────────────────────────── -->
<header class="topbar">
  <div class="topbar__brand">
    <div class="topbar__logo">
      <svg viewBox="0 0 28 28" fill="none"><circle cx="14" cy="14" r="12" stroke="currentColor" stroke-width="2"/><path d="M8 14h12M14 8v12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><circle cx="14" cy="14" r="4" fill="currentColor" opacity=".25"/></svg>
    </div>
    <div>
      <h1 class="topbar__title">ROC Monitor</h1>
      <span class="topbar__subtitle">Panel de Control — Medidores de Flujo</span>
    </div>
  </div>
  <div class="topbar__stats" id="headerStats">
    <div class="topbar__stat">
      <span class="topbar__stat-value" id="statStations">—</span>
      <span class="topbar__stat-label">Estaciones</span>
    </div>
    <div class="topbar__stat">
      <span class="topbar__stat-value" id="statSignals">—</span>
      <span class="topbar__stat-label">Señales</span>
    </div>
    <div class="topbar__stat">
      <span class="topbar__stat-value" id="statValues">—</span>
      <span class="topbar__stat-label">Registros</span>
    </div>
    <div class="topbar__stat">
      <span class="topbar__stat-value" id="statRange">—</span>
      <span class="topbar__stat-label">Cobertura</span>
    </div>
  </div>
  <div class="topbar__status">
    <span class="status-dot" id="statusDot"></span>
    <span class="topbar__clock" id="clock"></span>
  </div>
</header>

<!-- ── MAIN LAYOUT ───────────────────────────────────────────────────── -->
<div class="layout">

  <!-- SIDEBAR: station list -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar__header">
      <h2>Estaciones</h2>
      <button class="btn-icon" id="btnRefresh" title="Actualizar">
        <svg viewBox="0 0 20 20" fill="currentColor" width="16" height="16"><path d="M4.5 2.5C5.76 1.46 7.37 1 9 1a8 8 0 11-7.74 10h2.08A6 6 0 109 3c-1.13 0-2.2.37-3.07 1H8.5v2h-6v-6h2v2.5z"/></svg>
      </button>
    </div>
    <div class="sidebar__list" id="stationList">
      <div class="loading-placeholder">Cargando estaciones…</div>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="main">

    <!-- Overview grid -->
    <section class="panel" id="overviewPanel">
      <div class="panel__header">
        <h2 class="panel__title" id="panelTitle">Resumen General</h2>
        <div class="panel__controls">
          <select id="groupBy" class="select-control">
            <option value="station">Por Estación</option>
            <option value="element">Por Señal</option>
          </select>
        </div>
      </div>
      <div class="overview-grid" id="overviewGrid">
        <div class="loading-placeholder">Cargando datos…</div>
      </div>
    </section>

    <!-- Time series chart -->
    <section class="panel" id="chartPanel">
      <div class="panel__header">
        <h2 class="panel__title">Serie Temporal</h2>
        <div class="panel__controls">
          <div class="date-controls">
            <label>Desde</label>
            <input type="date" id="dateFrom" class="date-input">
            <label>Hasta</label>
            <input type="date" id="dateTo" class="date-input">
          </div>
          <div class="range-btns">
            <button class="range-btn" data-days="1">24h</button>
            <button class="range-btn active" data-days="7">7d</button>
            <button class="range-btn" data-days="30">30d</button>
            <button class="range-btn" data-days="90">90d</button>
            <button class="range-btn" data-days="365">1a</button>
            <button class="range-btn" data-days="0">Todo</button>
          </div>
        </div>
      </div>
      <div class="chart-container">
        <canvas id="mainChart"></canvas>
        <div class="chart-empty" id="chartEmpty">
          <svg viewBox="0 0 48 48" fill="none" width="48" height="48"><path d="M6 36l10-14 8 10 8-18 10 22" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity=".3"/></svg>
          <p>Selecciona una señal para visualizar</p>
        </div>
      </div>
      <!-- Selected signals chips -->
      <div class="selected-signals" id="selectedSignals"></div>
    </section>

    <!-- Data table -->
    <section class="panel" id="tablePanel" style="display:none">
      <div class="panel__header">
        <h2 class="panel__title">Datos</h2>
        <div class="panel__controls">
          <button class="btn-sm" id="btnExport">
            <svg viewBox="0 0 20 20" fill="currentColor" width="14" height="14"><path d="M3 17a1 1 0 01-1-1v-2h2v1h12v-1h2v2a1 1 0 01-1 1H3zM10 3l4 4h-3v5H9V7H6l4-4z"/></svg>
            Exportar CSV
          </button>
        </div>
      </div>
      <div class="table-wrap">
        <table class="data-table" id="dataTable">
          <thead>
            <tr>
              <th>Fecha</th>
              <th>Señal</th>
              <th>Valor</th>
              <th>Unidades</th>
            </tr>
          </thead>
          <tbody id="dataTableBody"></tbody>
        </table>
      </div>
    </section>

  </main>
</div>

<script src="app.js"></script>
</body>
</html>
